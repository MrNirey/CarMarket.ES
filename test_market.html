<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarMarket.ES — Автомобильный маркетплейс</title>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ СТИЛЯ (СТРОГИЙ КВАДРАТНЫЙ ДИЗАЙН И ТЕМНАЯ ТЕМА) */
        :root {
            --bg-main: #0d0d0d;
            --bg-card: #141414;
            --bg-input: #1a1a1a;
            --border-color: #262626;
            --text-main: #ffffff;
            --text-muted: #8c8c8c;
            --accent: #ffffff;
            --accent-green: #00ff66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-radius: 0 !important; /* Полный отказ от скруглений */
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--text-main);
            color: var(--bg-main);
            border-color: var(--text-main);
        }

        /* ПАНЕЛЬ ФИЛЬТРОВ */
        .filters-panel {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-input, .filter-select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 15px;
            font-size: 14px;
            flex: 1;
            min-width: 200px;
            outline: none;
        }

        .search-input:focus, .filter-select:focus {
            border-color: var(--accent);
        }

        /* СЕТКА КАТАЛОГА */
        .screen {
            display: none;
        }

        .screen.active-screen {
            display: block;
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        /* КАРТОЧКА МАШИНЫ */
        .car-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: border-color 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .car-card:hover {
            border-color: var(--accent);
        }

        .car-card-img-container {
            width: 100%;
            height: 180px;
            background-color: #1a1a1a;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .car-card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .car-card-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .car-card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .car-card-dealer {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .car-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            font-size: 14px;
        }

        .car-card-price {
            font-weight: 700;
            color: var(--accent-green);
        }

        /* СТИЛИ ДЛЯ ДЕТАЛЕЙ И КОРЗИНЫ */
        .no-data {
            grid-column: 1 / -1;
            padding: 60px 20px;
            text-align: center;
            color: var(--text-muted);
            border: 1px dashed var(--border-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="top-nav">
            <div class="logo">CarMarket.ES</div>
            <div class="nav-buttons">
                <button class="nav-btn active" id="menu-transport-btn">Каталог</button>
                <button class="nav-btn" id="menu-cart-btn">Корзина <span id="cart-badge" style="display:none; color: var(--accent-green)">●</span></button>
            </div>
        </div>

        <div class="filters-panel" id="header-filters-block">
            <input type="text" id="main-search-input" class="search-input" placeholder="Поиск автомобиля...">
            <select id="salon-main-select" class="filter-select"></select>
            <select id="transport-main-select" class="filter-select"></select>
            <select id="sort-main-select" class="filter-select"></select>
        </div>
    </header>

    <main>
        <div id="screen-catalog" class="screen active-screen">
            <div class="cars-grid" id="main-cars-grid"></div>
        </div>

        <div id="screen-cart" class="screen">
            <div style="padding: 40px; border: 1px solid var(--border-color); background: var(--bg-card); text-align: center;">
                <h3>Раздел корзины и оформления</h3>
                <p style="color: var(--text-muted); margin-top: 10px;" id="cart-status-text">Корзина пуста. Выберите машину в каталоге.</p>
            </div>
        </div>
    </main>

    <script>
        // БАЗА ДАННЫХ
        const carsData = [
            // Салон: AutoZentrum Berlin (Берлин)
            { id: 1, salon: 'berlin', brand: 'Volkswagen', name: 'Volkswagen Golf', price: '$18 500', priceRaw: 18500, qty: 18, year: '2020', mileageRaw: 57000, imgName: 'volkswagen_golf.png' },
            { id: 2, salon: 'berlin', brand: 'Skoda', name: 'Skoda Octavia', price: '$20 900', priceRaw: 20900, qty: 16, year: '2021', mileageRaw: 42000, imgName: 'skoda_octavia.png' },
            { id: 3, salon: 'berlin', brand: 'BMW', name: 'BMW 3 Series', price: '$32 900', priceRaw: 32900, qty: 21, year: '2019', mileageRaw: 68000, imgName: 'bmw_3_series.png' },
            { id: 4, salon: 'berlin', brand: 'Audi', name: 'Audi A4', price: '$28 900', priceRaw: 28900, qty: 14, year: '2020', mileageRaw: 61000, imgName: 'audi_a4.png' },
            
            // Салон: Iberia Motors (Мадрид)
            { id: 6, salon: 'madrid', brand: 'Toyota', name: 'Toyota Corolla', price: '$17 900', priceRaw: 17900, qty: 20, year: '2021', mileageRaw: 35000, imgName: 'toyota_corolla.png' },
            { id: 7, salon: 'madrid', brand: 'Honda', name: 'Honda Civic', price: '$19 900', priceRaw: 19900, qty: 15, year: '2020', mileageRaw: 49000, imgName: 'honda_civic.png' },
            { id: 8, salon: 'madrid', brand: 'Ford', name: 'Ford Focus', price: '$16 900', priceRaw: 16900, qty: 17, year: '2018', mileageRaw: 82000, imgName: 'ford_focus.png' },
            
            // Салон: Silesia Auto Hub (Варшава)
            { id: 10, salon: 'warsaw', brand: 'Renault', name: 'Renault Megane', price: '$17 200', priceRaw: 17200, qty: 11, year: '2019', mileageRaw: 73000, imgName: 'renault_megane.png' },
            { id: 11, salon: 'warsaw', brand: 'Nissan', name: 'Nissan Qashqai', price: '$22 900', priceRaw: 22900, qty: 13, year: '2020', mileageRaw: 45000, imgName: 'nissan_qashqai.png' },
            { id: 19, salon: 'warsaw', brand: 'Kia', name: 'Kia Sportage', price: '$22 400', priceRaw: 22400, qty: 11, year: '2020', mileageRaw: 54000, imgName: 'kia_sportage.png' },
            
            // Салон: Roman Luxury & Electro (Рим)
            { id: 5, salon: 'rome', brand: 'Mercedes-Benz', name: 'Mercedes-Benz C-Class', price: '$34 900', priceRaw: 34900, qty: 12, year: '2019', mileageRaw: 54000, imgName: 'mercedes-benz_c-class.png' },
            { id: 15, salon: 'rome', brand: 'BMW', name: 'BMW X3', price: '$41 900', priceRaw: 41900, qty: 8, year: '2020', mileageRaw: 51000, imgName: 'bmw_x3.png' },
            { id: 16, salon: 'rome', brand: 'Tesla', name: 'Tesla Model 3', price: '$35 900', priceRaw: 35900, qty: 7, year: '2021', mileageRaw: 28000, imgName: 'tesla_model_3.png' }
        ];

        // Глобальные стейты фильтров
        let currentSalon = 'all';
        let currentModel = 'all';
        let currentSort = 'popular';
        let searchString = '';

        // DOM Кэш
        const salonSelect = document.getElementById('salon-main-select');
        const transportSelect = document.getElementById('transport-main-select');
        const sortSelect = document.getElementById('sort-main-select');
        const searchInput = document.getElementById('main-search-input');
        const carsGrid = document.getElementById('main-cars-grid');

        const catalogScreen = document.getElementById('screen-catalog');
        const cartScreen = document.getElementById('screen-cart');
        const menuCatalogBtn = document.getElementById('menu-transport-btn');
        const menuCartBtn = document.getElementById('menu-cart-btn');

        // ИНИЦИАЛИЗАЦИЯ И СВЯЗЫВАНИЕ ФИЛЬТРОВ
        function buildInterface() {
            // 1. Автосалоны
            if (salonSelect) {
                salonSelect.innerHTML = `
                    <option value="all">Все автосалоны (Вся Европа)</option>
                    <option value="berlin">AutoZentrum Berlin (Берлин)</option>
                    <option value="madrid">Iberia Motors (Мадрид)</option>
                    <option value="warsaw">Silesia Auto Hub (Варшава)</option>
                    <option value="rome">Roman Luxury & Electro (Рим)</option>
                `;
                salonSelect.addEventListener('change', (e) => {
                    currentSalon = e.target.value;
                    renderCatalog();
                });
            }

            // 2. Группировка транспорта по маркам
            if (transportSelect) {
                const uniqueBrands = [...new Set(carsData.map(c => c.brand))].sort();
                let options = '<option value="all">Выбор транспорта (Все модели)</option>';
                
                uniqueBrands.forEach(brand => {
                    options += `<optgroup label="${brand}">`;
                    const brandModels = [...new Set(carsData.filter(c => c.brand === brand).map(c => c.name))].sort();
                    brandModels.forEach(model => {
                        options += `<option value="${model}">${model}</option>`;
                    });
                    options += `</optgroup>`;
                });
                transportSelect.innerHTML = options;
                transportSelect.addEventListener('change', (e) => {
                    currentModel = e.target.value;
                    renderCatalog();
                });
            }

            // 3. Рабочая сортировка
            if (sortSelect) {
                sortSelect.innerHTML = `
                    <option value="popular">Сортировать: Популярные</option>
                    <option value="price-asc">Цена: От дешевых к дорогим</option>
                    <option value="price-desc">Цена: От дорогих к дешевым</option>
                    <option value="year-desc">Год выпуска: Свежие</option>
                    <option value="mileage-asc">Пробег: Минимальный</option>
                `;
                sortSelect.addEventListener('change', (e) => {
                    currentSort = e.target.value;
                    renderCatalog();
                });
            }

            // 4. Поисковая строка
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchString = e.target.value.toLowerCase();
                    renderCatalog();
                });
            }
        }

        // РЕНДЕРИНГ КАТАЛОГА ПО ФИЛЬТРАМ И СОРТИРОВКЕ
        function renderCatalog() {
            if (!carsGrid) return;
            carsGrid.innerHTML = '';

            // Шаг А: Фильтрация данных
            let result = carsData.filter(car => {
                const passSearch = car.name.toLowerCase().includes(searchString);
                const passSalon = (currentSalon === 'all') || (car.salon === currentSalon);
                const passModel = (currentModel === 'all') || (car.name === currentModel);
                return passSearch && passSalon && passModel;
            });

            // Шаг Б: Сортировка данных
            if (currentSort === 'price-asc') {
                result.sort((a, b) => a.priceRaw - b.priceRaw);
            } else if (currentSort === 'price-desc') {
                result.sort((a, b) => b.priceRaw - a.priceRaw);
            } else if (currentSort === 'year-desc') {
                result.sort((a, b) => parseInt(b.year) - parseInt(a.year));
            } else if (currentSort === 'mileage-asc') {
                result.sort((a, b) => a.mileageRaw - b.mileageRaw);
            } else if (currentSort === 'popular') {
                result.sort((a, b) => b.qty - a.qty);
            }

            // Вывод заглушки, если ничего не найдено
            if (result.length === 0) {
                carsGrid.innerHTML = '<div class="no-data">Подходящих транспортных средств не найдено.</div>';
                return;
            }

            // Шаг В: Генерация чистых квадратных карточек
            result.forEach(car => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.innerHTML = `
                    <div class="car-card-img-container">
                        <span style="font-size:11px; color:var(--text-muted)">[Фото ${car.brand}]</span>
                    </div>
                    <div class="car-card-content">
                        <div class="car-card-title">${car.name}</div>
                        <div class="car-card-dealer">Год: ${car.year} | Салон: ${car.salon.toUpperCase()}</div>
                        <div class="car-card-footer">
                            <div class="car-card-price">${car.price}</div>
                            <div style="color:var(--text-muted); font-size:12px;">В наличии: ${car.qty} шт</div>
                        </div>
                    </div>
                `;
                carsGrid.appendChild(card);
            });
        }

        // ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ
        function setScreen(target) {
            if (target === 'catalog') {
                catalogScreen.classList.add('active-screen');
                cartScreen.classList.remove('active-screen');
                menuCatalogBtn.classList.add('active');
                menuCartBtn.classList.remove('active');
                document.getElementById('header-filters-block').style.display = 'flex';
            } else {
                catalogScreen.classList.remove('active-screen');
                cartScreen.classList.add('active-screen');
                menuCatalogBtn.classList.remove('active');
                menuCartBtn.classList.add('active');
                document.getElementById('header-filters-block').style.display = 'none';
            }
        }

        menuCatalogBtn.addEventListener('click', () => setScreen('catalog'));
        menuCartBtn.addEventListener('click', () => setScreen('cart'));

        // СТАРТ ПРИЛОЖЕНИЯ
        buildInterface();
        renderCatalog();
    </script>
</body>
</html>
