<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarMarket.ES — Автомобильный маркетплейс</title>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ СТИЛЯ (СТРОГИЙ КВАДРАТНЫЙ ДИЗАЙН И ТЕМНАЯ ТЕМА) */
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #141417;
            --bg-input: #1e1e24;
            --border-color: #2a2a32;
            --text-main: #ffffff;
            --text-muted: #92929f;
            --accent-green: #00ff66;
            --radius-main: 8px; /* Мягкие закругления */
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* ШАПКА И ВЕРХНИЕ ФИЛЬТРЫ */
        .header-main {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 30px;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border-radius: var(--radius-main);
            transition: all 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            color: var(--text-main);
            background: var(--bg-input);
            border-color: var(--text-muted);
        }

        .filters-panel {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-input, .filter-select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 15px;
            font-size: 14px;
            border-radius: 6px;
            outline: none;
            flex: 1;
            min-width: 200px;
        }

        /* КОНТЕНТ */
        .content-container {
            padding: 30px;
        }

        .screen { display: none; }
        .screen.active-screen { display: block; }

        /* СЕТКА И КАРТОЧКИ */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .car-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-main);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .car-card:hover {
            transform: translateY(-3px);
            border-color: var(--text-muted);
        }

        .car-card-img-container {
            height: 170px;
            background: #202026;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .car-card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .car-card-title {
            padding: 15px 15px 5px 15px;
            font-size: 17px;
            font-weight: 600;
        }

        .car-card-dealer {
            padding: 0 15px;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .car-card-footer {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .car-card-price {
            color: var(--accent-green);
            font-weight: 700;
        }

        /* ДЕТАЛИЗАЦИЯ ТОВАРА */
        .btn-back {
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .details-card-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: var(--radius-main);
        }

        .main-detail-img {
            width: 100%;
            border-radius: 6px;
        }

        .price-tag {
            font-size: 32px;
            color: var(--accent-green);
            font-weight: 800;
            margin: 15px 0;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
            background: var(--bg-main);
            padding: 20px;
            border-radius: 6px;
        }

        .btn-primary {
            background: var(--text-main);
            color: var(--bg-main);
            border: none;
            padding: 14px 28px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        /* КОРЗИНА И МОДАЛКА */
        .cart-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: var(--radius-main);
        }
        .empty-notify { color: var(--text-muted); padding: 20px 0; }
        .cart-card-item {
            display: flex; gap: 20px; background: var(--bg-main);
            padding: 15px; border-radius: 6px; margin-top: 20px;
        }
        .cart-card-item img { width: 120px; height: 80px; object-fit: cover; border-radius: 4px; }
        .cart-price { color: var(--accent-green); font-weight: 700; margin-top: 5px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            z-index: 999;
        }
        .modal-content {
            background: var(--bg-card); border: 1px solid var(--border-color);
            padding: 40px; border-radius: var(--radius-main); text-align: center; max-width: 420px;
        }
    </style>
</head>
<body>
    <header class="header-main">
        <div class="top-nav">
            <div class="logo">CarMarket.ES</div>
            <div class="nav-buttons">
                <button class="nav-btn active" id="menu-transport-btn">Каталог</button>
                <button class="nav-btn" id="menu-cart-btn">Корзина <span id="cart-badge" style="display:none; color: var(--accent-green)">●</span></button>
            </div>
        </div>

        <div class="filters-panel" id="header-filters-block">
            <input type="text" id="main-search-input" class="search-input" placeholder="Поиск автомобиля...">
            <select id="salon-main-select" class="filter-select"></select>
            <select id="transport-main-select" class="filter-select"></select>
            <select id="sort-main-select" class="filter-select"></select>
        </div>
    </header>

    <main class="content-container">
        <div id="screen-catalog" class="screen active-screen">
            <div class="cars-grid" id="main-cars-grid"></div>
        </div>

        <div id="screen-details" class="screen">
            <button class="btn-back" id="btn-back-to-catalog">← Назад в каталог</button>
            <div class="details-card-layout">
                <div class="details-media">
                    <img id="detail-img" src="" alt="Автомобиль" class="main-detail-img">
                </div>
                <div class="details-info">
                    <h1 id="detail-title">Название машины</h1>
                    <div class="price-tag" id="detail-price">$0</div>
                    <p id="detail-desc" class="car-description"></p>
                    
                    <div class="specs-grid">
                        <div class="spec-item"><strong>Год выпуска:</strong> <span id="spec-year">-</span></div>
                        <div class="spec-item"><strong>Привод:</strong> <span id="spec-drive">-</span></div>
                        <div class="spec-item"><strong>Пробег:</strong> <span id="spec-mileage">-</span></div>
                        <div class="spec-item"><strong>Коробка передач:</strong> <span id="spec-transmission">-</span></div>
                    </div>

                    <button class="btn-primary" id="action-buy-click">Купить в один клик</button>
                </div>
            </div>
        </div>

        <div id="screen-cart" class="screen">
            <div class="cart-box">
                <h2>Ваша корзина</h2>
                <div id="cart-empty-msg" class="empty-notify">Корзина пуста. Выберите машину в каталоге.</div>
                <div id="cart-item-row" class="cart-card-item" style="display: none;">
                    <img id="cart-item-img" src="" alt="">
                    <div class="cart-item-details">
                        <h3 id="cart-item-name"></h3>
                        <p id="cart-item-price" class="cart-price"></p>
                        <p style="color: var(--text-muted); font-size: 13px; margin-top: 5px;">Быстрый заказ оформлен в 1 клик.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="success-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div id="modal-car-name">Успешно добавлен в корзину!</div>
            <button class="btn-primary" id="btn-close-modal" style="margin-top: 20px;">Закрыть</button>
        </div>
    </div>
</body>

    <header>
        <div class="top-nav">
            <div class="logo">CarMarket.ES</div>
            <div class="nav-buttons">
                <button class="nav-btn active" id="menu-transport-btn">Каталог</button>
                <button class="nav-btn" id="menu-cart-btn">Корзина <span id="cart-badge" style="display:none; color: var(--accent-green)">●</span></button>
            </div>
        </div>

        <div class="filters-panel" id="header-filters-block">
            <input type="text" id="main-search-input" class="search-input" placeholder="Поиск автомобиля...">
            <select id="salon-main-select" class="filter-select"></select>
            <select id="transport-main-select" class="filter-select"></select>
            <select id="sort-main-select" class="filter-select"></select>
        </div>
    </header>

    <main>
        <div id="screen-catalog" class="screen active-screen">
            <div class="cars-grid" id="main-cars-grid"></div>
        </div>

        <div id="screen-cart" class="screen">
            <div style="padding: 40px; border: 1px solid var(--border-color); background: var(--bg-card); text-align: center;">
                <h3>Раздел корзины и оформления</h3>
                <p style="color: var(--text-muted); margin-top: 10px;" id="cart-status-text">Корзина пуста. Выберите машину в каталоге.</p>
            </div>
        </div>
    </main>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
    // 1. БАЗА ДАННЫХ
    const carsData = [
        { id: 1, salon: 'berlin', brand: 'Volkswagen', name: 'Volkswagen Golf', price: '$18 500', priceRaw: 18500, year: '2020', drive: 'Передний', mileage: '57 000 км', mileageRaw: 57000, transmission: 'Автомат', imgName: 'volkswagen_golf.png', qty: 18 },
        { id: 2, salon: 'berlin', brand: 'Skoda', name: 'Skoda Octavia', price: '$20 900', priceRaw: 20900, year: '2021', drive: 'Передний', mileage: '42 000 км', mileageRaw: 42000, transmission: 'Автомат', imgName: 'skoda_octavia.png', qty: 16 },
        { id: 3, salon: 'berlin', brand: 'BMW', name: 'BMW 3 Series', price: '$32 900', priceRaw: 32900, year: '2019', drive: 'Задний', mileage: '68 000 км', mileageRaw: 68000, transmission: 'Автомат', imgName: 'bmw_3_series.png', qty: 21 },
        { id: 4, salon: 'berlin', brand: 'Audi', name: 'Audi A4', price: '$28 900', priceRaw: 28900, year: '2020', drive: 'Передний', mileage: '61 000 км', mileageRaw: 61000, transmission: 'Автомат', imgName: 'audi_a4.png', qty: 14 },
        { id: 6, salon: 'madrid', brand: 'Toyota', name: 'Toyota Corolla', price: '$17 900', priceRaw: 17900, year: '2021', drive: 'Передний', mileage: '35 000 км', mileageRaw: 35000, transmission: 'Вариатор', imgName: 'toyota_corolla.png', qty: 20 },
        { id: 7, salon: 'madrid', brand: 'Honda', name: 'Honda Civic', price: '$19 900', priceRaw: 19900, year: '2020', drive: 'Передний', mileage: '49 000 км', mileageRaw: 49000, transmission: 'Автомат', imgName: 'honda_civic.png', qty: 15 },
        { id: 10, salon: 'warsaw', brand: 'Renault', name: 'Renault Megane', price: '$17 200', priceRaw: 17200, year: '2019', drive: 'Передний', mileage: '73 000 км', mileageRaw: 73000, transmission: 'Механика', imgName: 'renault_megane.png', qty: 11 },
        { id: 5, salon: 'rome', brand: 'Mercedes-Benz', name: 'Mercedes-Benz C-Class', price: '$34 900', priceRaw: 34900, year: '2019', drive: 'Задний', mileage: '54 000 км', mileageRaw: 54000, transmission: 'Автомат', imgName: 'mercedes-benz_c-class.png', qty: 12 }
    ];

    // Глобальное состояние
    let selectedSalon = 'all';
    let selectedModel = 'all';
    let selectedSort = 'popular';
    let searchWord = '';
    let currentCart = null;

    // DOM Элементы
    const catalogScreen = document.getElementById('screen-catalog');
    const detailsScreen = document.getElementById('screen-details');
    const cartScreen = document.getElementById('screen-cart');
    const carsGrid = document.getElementById('main-cars-grid');
    const modal = document.getElementById('success-modal');

    // 2. ЗАПОЛНЕНИЕ ВЕРХНИХ ФИЛЬТРОВ
    function initSelectors() {
        const salonSelect = document.getElementById('salon-main-select');
        const transportSelect = document.getElementById('transport-main-select');
        const sortSelect = document.getElementById('sort-main-select');
        const searchInput = document.getElementById('main-search-input');

        if (salonSelect) {
            salonSelect.innerHTML = `
                <option value="all">Все автосалоны (Вся Европа)</option>
                <option value="berlin">AutoZentrum Berlin (Берлин)</option>
                <option value="madrid">Iberia Motors (Мадрид)</option>
                <option value="warsaw">Silesia Auto Hub (Варшава)</option>
                <option value="rome">Roman Luxury (Рим)</option>
            `;
            salonSelect.onchange = (e) => { selectedSalon = e.target.value; renderCatalog(); };
        }

        if (transportSelect) {
            const brands = [...new Set(carsData.map(c => c.brand))].sort();
            let optionsHTML = '<option value="all">Выбор транспорта (Все модели)</option>';
            brands.forEach(brand => {
                optionsHTML += `<optgroup label="${brand}">`;
                const models = [...new Set(carsData.filter(c => c.brand === brand).map(c => c.name))].sort();
                models.forEach(model => { optionsHTML += `<option value="${model}">${model}</option>`; });
                optionsHTML += `</optgroup>`;
            });
            transportSelect.innerHTML = optionsHTML;
            transportSelect.onchange = (e) => { selectedModel = e.target.value; renderCatalog(); };
        }

        if (sortSelect) {
            sortSelect.innerHTML = `
                <option value="popular">Сортировать: Популярные</option>
                <option value="price-asc">Цена: От дешевых к дорогим</option>
                <option value="price-desc">Цена: От дорогих к дешевым</option>
                <option value="year-desc">Год выпуска: Свежие</option>
            `;
            sortSelect.onchange = (e) => { selectedSort = e.target.value; renderCatalog(); };
        }

        if (searchInput) {
            searchInput.oninput = (e) => { searchWord = e.target.value.toLowerCase(); renderCatalog(); };
        }
    }

    // 3. СТАБИЛЬНЫЙ РЕНДЕР КАТАЛОГА КАРТОЧЕК
    function renderCatalog() {
        if (!carsGrid) return;
        carsGrid.innerHTML = '';
        
        let filteredCars = carsData.filter(car => {
            const matchesSearch = car.name.toLowerCase().includes(searchWord);
            const matchesSalon = (selectedSalon === 'all') || (car.salon === selectedSalon);
            const matchesModel = (selectedModel === 'all') || (car.name === selectedModel);
            return matchesSearch && matchesSalon && matchesModel;
        });
        
        if (selectedSort === 'price-asc') filteredCars.sort((a, b) => a.priceRaw - b.priceRaw);
        else if (selectedSort === 'price-desc') filteredCars.sort((a, b) => b.priceRaw - a.priceRaw);
        else if (selectedSort === 'year-desc') filteredCars.sort((a, b) => parseInt(b.year) - parseInt(a.year));
        else if (selectedSort === 'popular') filteredCars.sort((a, b) => b.qty - a.qty);

        if (filteredCars.length === 0) {
            carsGrid.innerHTML = '<div style="padding:50px; text-align:center; width:100%; color:var(--text-muted);">Ничего не найдено</div>';
            return;
        }

        filteredCars.forEach(car => {
            const card = document.createElement('div');
            card.className = 'car-card';
            
            // Надежная привязка обработчика клика на переход
            card.addEventListener('click', () => openDetails(car));

            card.innerHTML = `
                <div class="car-card-img-container">
                    <img src="Car/${car.imgName}" class="car-card-img" alt="${car.name}" onerror="this.style.display='none';">
                </div>
                <div class="car-card-title">${car.name}</div>
                <div class="car-card-dealer">Официальный дилер: ${car.salon.toUpperCase()}</div>
                <div class="car-card-footer">
                    <div class="car-card-price">Цена от: ${car.price}</div>
                    <div style="color:var(--text-muted); font-size:12px;">Кол-во: ${car.qty} шт</div>
                </div>
            `;
            carsGrid.appendChild(card);
        });
    }

    // 4. ФУНКЦИЯ ДЕТАЛИЗАЦИИ КАРТОЧКИ
    function openDetails(car) {
        if (catalogScreen) catalogScreen.classList.remove('active-screen');
        if (cartScreen) cartScreen.classList.remove('active-screen');
        if (detailsScreen) detailsScreen.classList.add('active-screen');
        
        // Скрываем фильтры при переходе на экран деталей
        const filtersBlock = document.getElementById('header-filters-block');
        if (filtersBlock) filtersBlock.style.display = 'none';

        document.getElementById('detail-img').src = `Car/${car.imgName}`;
        document.getElementById('detail-title').innerText = car.name;
        document.getElementById('detail-price').innerText = car.price;
        document.getElementById('detail-desc').innerText = `Оригинальный ${car.name}. Полный пакет документов, идеальное состояние кузова и салона. Доступен для моментальной отправки логистической службой.`;
        
        document.getElementById('spec-year').innerText = car.year;
        document.getElementById('spec-drive').innerText = car.drive;
        document.getElementById('spec-mileage').innerText = car.mileage;
        document.getElementById('spec-transmission').innerText = car.transmission;
    }

    // НАВИГАЦИЯ МЕЖДУ ЭКРАНАМИ
    function switchScreen(target) {
        if (catalogScreen) catalogScreen.classList.remove('active-screen');
        if (detailsScreen) detailsScreen.classList.remove('active-screen');
        if (cartScreen) cartScreen.classList.remove('active-screen');
        
        const btnTrans = document.getElementById('menu-transport-btn');
        const btnCart = document.getElementById('menu-cart-btn');
        const filtersBlock = document.getElementById('header-filters-block');
        
        if (btnTrans) btnTrans.classList.remove('active');
        if (btnCart) btnCart.classList.remove('active');

        if (target === 'catalog') {
            if (catalogScreen) catalogScreen.classList.add('active-screen');
            if (btnTrans) btnTrans.classList.add('active');
            if (filtersBlock) filtersBlock.style.display = 'flex'; // Показываем фильтры
        } else if (target === 'cart') {
            if (cartScreen) cartScreen.classList.add('active-screen');
            if (btnCart) btnCart.classList.add('active');
            if (filtersBlock) filtersBlock.style.display = 'none'; // Скрываем фильтры
            renderCartPage();
        }
    }

    // ОФОРМЛЕНИЕ В ОДИН КЛИК
    const buyBtn = document.getElementById('action-buy-click');
    if (buyBtn) {
        buyBtn.onclick = () => {
            const title = document.getElementById('detail-title').innerText;
            const price = document.getElementById('detail-price').innerText;
            const img = document.getElementById('detail-img').src;

            currentCart = { name: title, price: price, img: img };
            
            const badge = document.getElementById('cart-badge');
            if (badge) badge.style.display = 'inline-block';

            const modalText = document.getElementById('modal-car-name');
            if (modalText) {
                modalText.innerHTML = `Товар <strong>${title}</strong> успешно добавлен в корзину!<br><br>Сформирован быстрый заказ в один клик.`;
            }
            if (modal) modal.style.display = 'flex';
        };
    }

    function renderCartPage() {
        const emptyMsg = document.getElementById('cart-empty-msg');
        const itemRow = document.getElementById('cart-item-row');
        
        if (currentCart) {
            if (emptyMsg) emptyMsg.style.display = 'none';
            if (itemRow) {
                itemRow.style.display = 'flex';
                document.getElementById('cart-item-img').src = currentCart.img;
                document.getElementById('cart-item-name').innerText = currentCart.name;
                document.getElementById('cart-item-price').innerText = currentCart.price;
            }
        } else {
            if (emptyMsg) emptyMsg.style.display = 'block';
            if (itemRow) itemRow.style.display = 'none';
        }
    }

    // СЛУШАТЕЛИ КНОПОК НАВИГАЦИИ
    const mTransBtn = document.getElementById('menu-transport-btn'); if (mTransBtn) mTransBtn.onclick = () => switchScreen('catalog');
    const mCartBtn = document.getElementById('menu-cart-btn'); if (mCartBtn) mCartBtn.onclick = () => switchScreen('cart');
    const backBtn = document.getElementById('btn-back-to-catalog'); if (backBtn) backBtn.onclick = () => switchScreen('catalog');
    const closeMBtn = document.getElementById('btn-close-modal'); if (closeMBtn) closeMBtn.onclick = () => { if (modal) modal.style.display = 'none'; };

    // ЗАПУСК
    initSelectors();
    renderCatalog();
});
    </script>
</body>
</html>
