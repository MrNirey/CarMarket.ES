<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIWANG Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #111215;
            --bg-card: #17181c;
            --bg-sidebar: #141518;
            --bg-input: #1d1e22;
            --accent-blue: #3b82f6;
            --accent-green: #2ecc71;
            --text-main: #ffffff;
            --text-muted: #767980;
            --border-color: #23252a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Левое главное меню */
        .sidebar { width: 220px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px 0; justify-content: space-between; }
        .logo-container { padding: 0 20px 20px 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 15px; }
        .logo { font-size: 20px; font-weight: 900; color: var(--text-main); font-style: italic; display: flex; align-items: center; gap: 8px; }
        .logo span { color: #3b82f6; }
        
        .menu-scroll { flex: 1; overflow-y: auto; padding: 0 10px; }
        .menu-group { display: flex; flex-direction: column; gap: 2px; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px 15px; color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer; border-left: 3px solid transparent; }
        .menu-item:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .menu-item.active { background: linear-gradient(90deg, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 100%); color: #fff; border-left-color: var(--accent-blue); }
        .menu-item i { width: 16px; text-align: center; font-size: 14px; }
        
        .sidebar-footer { padding: 15px 20px 0 20px; border-top: 1px solid var(--border-color); }

        /* Основной контент */
        .main-container { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Верхняя панель */
        .header { height: 60px; background-color: var(--bg-sidebar); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .header-filters { display: flex; gap: 10px; }
        .header-dropdown { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 14px; font-size: 12px; display: flex; align-items: center; gap: 25px; cursor: pointer; font-weight: 600; }
        .header-dropdown i { font-size: 10px; }
        
        .user-panel { display: flex; align-items: center; gap: 20px; }
        .wallet-info { display: flex; flex-direction: column; align-items: flex-end; font-size: 12px; font-weight: 600; }
        .cash { color: #fff; display: flex; align-items: center; gap: 5px; }
        .bank { color: var(--text-muted); }
        .btn-create { background: var(--accent-blue); color: white; border: none; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .user-avatar { width: 32px; height: 32px; background: #555; border-radius: 50%; }

        /* Экраны */
        .screen { display: none; flex: 1; overflow: hidden; }
        .screen.active-screen { display: flex; }
        
        /* Сетка каталога */
        .catalog-layout { display: flex; width: 100%; height: 100%; }
        
        /* Левая панель фильтров */
        .filters-sidebar { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; }
        .filters-header { display: flex; justify-content: space-between; align-items: center; }
        .filters-title { font-size: 14px; font-weight: 700; }
        .btn-reset { color: var(--accent-blue); background: none; border: none; font-size: 11px; cursor: pointer; }
        
        .filter-section { display: flex; flex-direction: column; gap: 8px; }
        .filter-label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Кнопки типов */
        .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .type-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-muted); padding: 6px; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .type-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        
        /* Инпуты фильтров */
        .select-input { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 12px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .range-inputs { display: flex; gap: 8px; }
        .range-box { background: var(--bg-input); border: 1px solid var(--border-color); flex: 1; display: flex; align-items: center; padding: 6px 10px; }
        .range-box span { font-size: 11px; color: var(--text-muted); width: 20px; }
        .range-box input { background: none; border: none; color: white; width: 100%; font-size: 12px; outline: none; }
        
        /* Чекбоксы */
        .checkbox-group { display: flex; flex-direction: column; gap: 6px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #fff; cursor: pointer; }
        .checkbox-item input { accent-color: var(--accent-blue); }

        .btn-submit-filter { background: var(--accent-blue); color: white; border: none; padding: 12px; font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; margin-top: auto; }

        /* Правая часть: Сетка скролла машин */
        .cars-scroll-area { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg-main); }
        .cars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        
        /* Карточка строго 1в1 */
        .car-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; cursor: pointer; position: relative; display: flex; flex-direction: column; }
        .car-card:hover { border-color: #333; }
        .card-info-icon { position: absolute; top: 12px; right: 12px; color: var(--text-muted); font-size: 12px; opacity: 0.6; }
        
        .car-card-img-container { width: 100%; height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .car-card-img { max-width: 90%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
        
        .car-card-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .car-card-dealer { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
        
        .car-card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.03); padding-top: 10px; margin-top: auto; }
        .car-card-meta span strong { color: #fff; font-weight: 600; }
